<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
    {% load static %}

    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<div class="builder-page">

    <nav class="navbar">
        <div class="logo-box">
            <div class="logo">AI</div>
            <div>
                <h2>ResumeAI</h2>
                <p>Free AI Resume Builder</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/">Analyze Resume</a>
        </div>
    </nav>

    <div class="builder-container">

        <div class="builder-header">
            <p class="tag">FREE AI RESUME CREATION</p>
            <h1>Create an ATS-friendly resume with AI.</h1>
            <p>
                Enter your details and target job role. The AI will generate professional resume
                content suitable for IT and non-IT roles.
            </p>
        </div>

        <form method="POST" action="{% url 'build_resume' %}" class="builder-form">
            {% csrf_token %}

            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter email" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="Enter phone number" required>
                </div>

                <div class="form-group">
                    <label>Target Job Role</label>
                    <input type="text" name="target_role" placeholder="Example: Data Analyst, Teacher, Accountant" required>
                </div>
            </div>

            <div class="form-group">
                <label>Education</label>
                <textarea name="education" rows="3" placeholder="Example: B.Tech CSE, B.Com, MBA, Intermediate, etc." required></textarea>
            </div>

            <div class="form-group">
                <label>Skills</label>
                <textarea name="skills" rows="3" placeholder="Example: Python, SQL, Excel, Tally, Communication, Teaching, Sales..." required></textarea>
            </div>

            <div class="form-group">
                <label>Projects</label>
                <textarea name="projects" rows="4" placeholder="Mention your projects. If none, write academic projects or practical work."></textarea>
            </div>

            <div class="form-group">
                <label>Experience / Internship</label>
                <textarea name="experience" rows="4" placeholder="Mention work experience, internship, training, or write Fresher."></textarea>
            </div>

            <div class="form-group">
                <label>Certifications</label>
                <textarea name="certifications" rows="3" placeholder="Mention courses, certificates, workshops, etc."></textarea>
            </div>

            <div class="form-group">
                <label>Achievements</label>
                <textarea name="achievements" rows="3" placeholder="Mention achievements, solved problems, awards, participation, etc."></textarea>
            </div>

            <button type="submit">Generate Resume Content</button>
        </form>

    </div>

</div>

</body>
</html>
